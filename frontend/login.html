<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOLIVE - Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-container">
                <img src="/assets/images/autolive-logo.png" alt="AUTOLIVE Logo" class="logo">
                <!-- atau pakai SVG -->
                <img src="/assets/images/autolive-logo.svg" alt="AUTOLIVE Logo" class="logo">
                <!-- atau pakai teks dengan CSS -->
                <div class="logo-text">AUTOLIVE</div>
            <h1 class="slogan">Automation platform for viral content discovery and multi-platform video publishing.</h1>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
                
                <button type="button" id="googleLogin" class="btn btn-google btn-block">
                    <img src="https://www.google.com/favicon.ico" alt="Google" class="btn-icon">
                    Login with Google
                </button>

                <div class="auth-links">
                    <a href="/register" class="btn btn-link">Register</a>
                </div>
            </form>

            <div class="language-selector">
                <select id="languageSelect">
                    <option value="en">English</option>
                    <option value="id">Bahasa Indonesia</option>
                </select>
            </div>

            <div class="auth-description">
                <p>AUTOLIVE helps you discover viral videos, generate clips automatically, and upload content to multiple platforms.</p>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    alert('Login failed: ' + data.message);
                }
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });

        document.getElementById('googleLogin').addEventListener('click', () => {
            // Implement Google OAuth
            window.location.href = '/api/login/google';
        });

        document.getElementById('languageSelect').addEventListener('change', (e) => {
            const lang = e.target.value;
            // Implement language change
            console.log('Language changed to:', lang);
        });
    </script>
</body>
</html>
