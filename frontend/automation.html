<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AUTOLIVE - Automation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">... (Copy Sidebar) ...</div>
    <div class="main-content">
        <div class="card">
            <h2>Configure Automation</h2>
            <form id="automationForm">
                <label>Video Category</label>
                <select id="category">
                    <option value="motivation">Motivation</option>
                    <option value="technology">Technology</option>
                    <option value="gaming">Gaming</option>
                </select>

                <label>Min Views Filter</label>
                <select id="views">
                    <option value="10000">10,000+</option>
                    <option value="100000">100,000+</option>
                </select>

                <label>Clip Length</label>
                <select id="length">
                    <option value="15">15 Seconds</option>
                    <option value="60">60 Seconds (Shorts/Reels)</option>
                </select>

                <label>Subtitles</label>
                <select id="subtitles">
                    <option value="single">Single Language</option>
                    <option value="dual">Dual Language</option>
                </select>

                <button type="button" onclick="startAutomation()">START AUTOMATION</button>
            </form>
        </div>
    </div>
    <script>
        async function startAutomation() {
            const data = {
                category: document.getElementById('category').value,
                views: document.getElementById('views').value,
                length: document.getElementById('length').value
            };
            
            const res = await fetch('/api/automation/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
        }
    </script>
</body>
</html>
